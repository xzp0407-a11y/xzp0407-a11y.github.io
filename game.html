<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型知识测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', '黑体', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-title {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .question-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .question-text {
            font-size: 20px;
            color: #495057;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: linear-gradient(45deg, #ffffff, #f8f9fa);
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 18px 15px;
            font-size: 16px;
            color: #495057;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', 'Microsoft YaHei', '黑体', sans-serif;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
            background: linear-gradient(45deg, #f8f9fa, #e3f2fd);
        }

        .option-btn:active {
            transform: translateY(-1px);
        }

        .option-btn.correct {
            background: linear-gradient(45deg, #d4edda, #c3e6cb);
            border-color: #28a745;
            color: #155724;
            animation: correctPulse 0.6s ease;
        }

        .option-btn.incorrect {
            background: linear-gradient(45deg, #f8d7da, #f5c6cb);
            border-color: #dc3545;
            color: #721c24;
            animation: shake 0.5s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .feedback {
            font-size: 18px;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback.correct {
            background: linear-gradient(45deg, #d4edda, #c3e6cb);
            color: #155724;
            border: 1px solid #28a745;
        }

        .feedback.incorrect {
            background: linear-gradient(45deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 1px solid #dc3545;
        }

        .score-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(45deg, #e3f2fd, #bbdefb);
            border-radius: 10px;
            border: 1px solid #2196f3;
        }

        .score {
            font-size: 18px;
            color: #1565c0;
            font-weight: bold;
        }

        .progress {
            font-size: 16px;
            color: #495057;
        }

        .next-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', 'Microsoft YaHei', '黑体', sans-serif;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .start-screen, .end-screen {
            text-align: center;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', 'Microsoft YaHei', '黑体', sans-serif;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            margin-top: 20px;
        }

        .start-btn:hover, .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }

        .hidden {
            display: none;
        }

        .final-score {
            font-size: 36px;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-description {
            font-size: 16px;
            color: #6c757d;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .score-value {
            color: #28a745;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <h1 class="game-title">🧠 大模型知识测试</h1>
            <p class="game-description">
                测试你对大模型核心概念的掌握程度！<br>
                每题20分，共5道题，满分100分。
            </p>
            <button class="start-btn" onclick="startGame()">开始测试</button>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" class="hidden">
            <div class="score-container">
                <div class="score">得分: <span id="score" class="score-value">0</span>/100</div>
                <div class="progress">题目 <span id="currentQuestion">1</span> / 5</div>
            </div>

            <div class="question-container">
                <div class="question-text" id="questionText"></div>
                <div class="options-grid" id="optionsContainer"></div>
            </div>

            <div class="feedback" id="feedback"></div>
            <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题</button>
        </div>

        <!-- 结束界面 -->
        <div id="endScreen" class="end-screen hidden">
            <h1 class="game-title">🎉 测试完成！</h1>
            <div class="final-score">最终得分: <span id="finalScore">0</span>/100</div>
            <div id="resultMessage"></div>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "一种基于深度学习的自然语言处理模型，能够理解和生成人类语言，通过大量文本数据训练获得语言理解和生成能力。",
                options: ["大模型幻觉", "LLM", "微调", "推理"],
                correct: 1,
                explanation: "正确！LLM（Large Language Model）是大型语言模型的简称，通过大规模数据训练，具备强大的语言理解和生成能力。"
            },
            {
                question: "用户输入给AI模型的指令或问题，用于引导模型产生特定的输出或行为。",
                options: ["LLM", "推理", "Prompt", "微调"],
                correct: 2,
                explanation: "正确！Prompt（提示词）是用户与AI交互的关键，通过精心设计可以引导AI产生更符合预期的输出。"
            },
            {
                question: "AI模型生成看似合理但实际上是虚假、不准确或完全编造的信息的现象，模型会自信地陈述这些错误信息。",
                options: ["推理", "大模型幻觉", "微调", "Prompt"],
                correct: 1,
                explanation: "正确！大模型幻觉是指AI生成看似合理但实际错误的内容，这是大模型需要重点解决的问题之一。"
            },
            {
                question: "在预训练模型基础上，使用特定领域或任务的数据进行额外训练，使模型适应特定应用场景的过程。",
                options: ["推理", "LLM", "微调", "大模型幻觉"],
                correct: 2,
                explanation: "正确！微调是在预训练基础上进行针对性训练，让模型更好地适应特定任务和领域需求。"
            },
            {
                question: "模型使用训练好的参数对新输入数据进行处理并产生输出的过程，是模型实际应用的阶段。",
                options: ["微调", "Prompt", "推理", "大模型幻觉"],
                correct: 2,
                explanation: "正确！推理是模型运用学到的知识进行分析和判断的过程，是AI产生输出的核心机制。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            currentQuestionIndex = 0;
            score = 0;
            updateScore();
            showQuestion();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function showQuestion() {
            answered = false;
            const question = questions[currentQuestionIndex];
            
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });
            
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('nextBtn').classList.add('hidden');
        }

        function selectOption(selectedIndex) {
            if (answered) return;
            answered = true;
            
            const question = questions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');
            const feedback = document.getElementById('feedback');
            
            buttons.forEach((button, index) => {
                button.style.pointerEvents = 'none';
                if (index === question.correct) {
                    button.classList.add('correct');
                } else if (index === selectedIndex) {
                    button.classList.add('incorrect');
                }
            });
            
            if (selectedIndex === question.correct) {
                score += 20; // 每题20分
                updateScore(); // 立即更新得分显示
                feedback.textContent = '🎉 回答正确！' + question.explanation;
                feedback.className = 'feedback correct';
            } else {
                feedback.textContent = '❌ 回答错误。' + question.explanation;
                feedback.className = 'feedback incorrect';
            }
            
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
            
            let message = '';
            if (score === 100) {
                message = '🏆 完美！你对大模型概念掌握得非常好！';
            } else if (score >= 80) {
                message = '👏 很棒！你对大模型有很好的理解！';
            } else if (score >= 60) {
                message = '👍 不错！继续加强对大模型概念的学习！';
            } else {
                message = '📚 需要多加练习，建议复习相关概念！';
            }
            
            document.getElementById('resultMessage').innerHTML = `<p style="font-size: 18px; color: #495057; margin: 20px 0;">${message}</p>`;
        }

        function restartGame() {
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
